name: Build

on:
  push:
    branches:
    - develop
  pull_request:
    branches:
    - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '7.0.102'

    - name: Install dependencies
      run: dotnet restore

    - name: Execute dotnet
      run: dotnet build 

    - name: Run unit tests in test folder
      run: test

    - name: Publish all projects as Release
      run: publish --configuration Release --output ./publish

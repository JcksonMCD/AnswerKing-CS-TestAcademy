name: Build

on:
  push:
    branches:
    - develop
  pull_request:
    branches:
    - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet packages 
      run: dotnet restore

    - name: Build all packages 
      uses: dotnet/actions@v1
      with:
        command: build
        projects: '**/*.csproj'

    - name: Run unit tests in test folder
      uses: dotnet/actions@v1
      with:
        command: test
        projects: 'src/tests/*Tests/*.csproj'

    - name: Publish all projects as Release
      uses: dotnet/actions@v1
      with:
        command: publish
        projects: '**/*.csproj'
        args: --configuration Release --output ./publish

    - name: Upload published artifacts
      uses: actions/upload-artifact@v4
      with:
        name: published-app
        path: ./publish
        
    

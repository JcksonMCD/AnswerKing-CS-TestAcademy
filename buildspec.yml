version: 0.2
phases:
  install:
    runtime-versions:
      dotnet: 7.0.102

  pre_build:
    commands:
      - echo Restore started on $(date +%Y-%m-%d) 
      - dotnet restore

  build:
    commands:
      - echo Build started on $(date +%Y-%m-%d) 
      - dotnet build 

  post_build:
    commands:
      - echo Running tests...
      - dotnet test --no-build --verbosity normal
      

